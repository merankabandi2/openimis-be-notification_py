<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#f4f4f7;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f7;">
    <tr>
      <td align="center" style="padding:24px 0;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background-color:#ffffff;border-radius:8px;overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="background-color:#1a237e;padding:20px 24px;text-align:center;">
              {% if logo_url %}
              <img src="{{ logo_url }}" alt="Merankabandi" style="max-height:48px;" />
              {% else %}
              <span style="color:#ffffff;font-size:20px;font-weight:bold;">Merankabandi</span>
              {% endif %}
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:32px 24px;">
              <h2 style="margin:0 0 16px;color:#1a237e;font-size:18px;">{{ subject }}</h2>
              <p style="margin:0 0 24px;color:#333333;font-size:14px;line-height:1.6;">{{ body }}</p>
              {% if action_url %}
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto;">
                <tr>
                  <td style="background-color:#1a237e;border-radius:4px;padding:12px 24px;">
                    <a href="{{ action_url }}" style="color:#ffffff;text-decoration:none;font-size:14px;font-weight:bold;">
                      {{ action_label|default:"Voir dans l'application" }} &rarr;
                    </a>
                  </td>
                </tr>
              </table>
              {% endif %}
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background-color:#f4f4f7;padding:16px 24px;text-align:center;border-top:1px solid #e0e0e0;">
              <p style="margin:0;color:#999999;font-size:12px;line-height:1.5;">
                Merankabandi &mdash; Programme de Protection Sociale du Burundi<br>
                Ceci est un message automatique. Merci de ne pas y repondre.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
